#-------------------------------
# Author Settings
author:
  name: Pawel Kaplanski, PhD
  bio: Dr. Pawel Kaplanski stands at the forefront of a new industrial revolution—where machines not only move, but think and protect. With a PhD in Artificial Intelligence and formal training in theoretical physics, Dr. Kaplanski brings a unique perspective to the intersection of energy, computation, and human rights. He believes that while the first industrial revolution turned fuel into motion, today we are witnessing a leap where energy creates intelligence through AI and secures freedom and trust via Bitcoin. Having launched and scaled startups in AI, cybersecurity, logistics, and payment systems, and authoring over 45 scientific papers and 2 patents, Dr. Kaplanski’s work explores how the fundamental laws of energy are redefining intelligence, value, and trust for the digital age.
  avatar: '/images/pawel.jpeg'

social:
- {icon: "ion-logo-linkedin", label: Linkedin, link: "https://www.linkedin.com/in/kaplanski/"}
- {icon: "ion-logo-twitter", label: Twitter, link: "https://twitter.com/Pawel_Kaplanski"}
- {icon: "ion-logo-github", label: Github, link: "https://github.com/sonofsatoshi"}
- {icon: "ion-ios-bulb", label: Patents, link: "https://patents.google.com/?q=(kaplanski+pawel)&oq=kaplanski+pawel"}
- {icon: "ion-ios-school", label: Scholar, link: "https://scholar.google.com/citations?user=Hu5Wzb0AAAAJ"}

# Example of adding a new link to the author section and footer - {icon: "ion-logo-github", label: Github, link: "https://github.com"}
# Other icons can be found at https://ionicons.com/v4/

